rules:
  # ============================================================
  # SQL Injection Detection — Taint Analysis (CWE-89)
  # Tracks user input flowing into SQL query execution
  # ============================================================

  - id: python-sqli-taint
    mode: taint
    message: >
      User-controlled input flows into a SQL query without parameterization.
      Use parameterized queries (e.g., cursor.execute("SELECT ... WHERE id = %s", (user_id,)))
      instead of string formatting.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-89: SQL Injection"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python
    pattern-sources:
      - patterns:
          - pattern: |
              def $FUNC(..., $PARAM, ...):
                  ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      # cursor.execute with string formatting
      - patterns:
          - pattern: $CURSOR.execute($QUERY, ...)
          - focus-metavariable: $QUERY
      # engine.execute
      - patterns:
          - pattern: $ENGINE.execute($QUERY, ...)
          - focus-metavariable: $QUERY
      # SQLAlchemy text()
      - patterns:
          - pattern: text($QUERY)
          - focus-metavariable: $QUERY
      # pd.read_sql
      - patterns:
          - pattern: pd.read_sql($QUERY, ...)
          - focus-metavariable: $QUERY
      # connection.execute
      - patterns:
          - pattern: $CONN.execute($QUERY)
          - focus-metavariable: $QUERY
    pattern-sanitizers:
      - pattern: int(...)
      - pattern: float(...)
      - pattern: str(int(...))
      # Parameterized query patterns are safe by design

  # Regex fallback: detect SQL query building via string formatting
  # The taint rule above handles data flow; this catches literal patterns
  # where user input is formatted directly into a SQL-like string.
  - id: python-sqli-string-format
    pattern-either:
      - pattern: $CURSOR.execute("..." % $INPUT)
      - pattern: $CURSOR.execute(f"...{$INPUT}...")
      - pattern: $CURSOR.execute("..." + $INPUT + "...")
      - pattern: $CURSOR.execute("...".format($INPUT))
    message: >
      SQL query built with string formatting passed to execute() — potential SQL injection.
      Use parameterized queries instead.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-89: SQL Injection"
      confidence: MEDIUM
      impact: HIGH
      category: security
      technology:
        - python
