rules:
  # ============================================================
  # Command Injection Detection — Taint Analysis (CWE-78)
  # Tracks user input flowing into system command execution
  # ============================================================

  - id: python-cmdi-taint
    mode: taint
    message: >
      User-controlled input flows into a system command without sanitization.
      Use subprocess with a list of arguments (shell=False) instead of
      string concatenation with shell=True.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-78: OS Command Injection"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python
    pattern-sources:
      - patterns:
          - pattern: |
              def $FUNC(..., $PARAM, ...):
                  ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      # os.system
      - patterns:
          - pattern: os.system($CMD)
          - focus-metavariable: $CMD
      # subprocess.call with shell=True
      - patterns:
          - pattern: subprocess.call($CMD, ..., shell=True, ...)
          - focus-metavariable: $CMD
      # subprocess.run with shell=True
      - patterns:
          - pattern: subprocess.run($CMD, ..., shell=True, ...)
          - focus-metavariable: $CMD
      # subprocess.Popen with shell=True
      - patterns:
          - pattern: subprocess.Popen($CMD, ..., shell=True, ...)
          - focus-metavariable: $CMD
      # os.popen
      - patterns:
          - pattern: os.popen($CMD)
          - focus-metavariable: $CMD
      # eval
      - patterns:
          - pattern: eval($CODE)
          - focus-metavariable: $CODE
      # exec
      - patterns:
          - pattern: exec($CODE)
          - focus-metavariable: $CODE
    pattern-sanitizers:
      - pattern: shlex.quote(...)
      - pattern: int(...)
      - pattern: float(...)
