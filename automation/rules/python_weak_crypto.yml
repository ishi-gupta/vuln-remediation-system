rules:
  # ============================================================
  # Weak Cryptography Detection (CWE-327, CWE-328)
  # Detects use of broken/weak cryptographic algorithms
  # ============================================================

  # Taint rule: user data hashed with weak algorithm
  - id: python-weak-hash-taint
    mode: taint
    message: >
      Data flows into a weak hashing algorithm (MD5 or SHA1).
      These are cryptographically broken for security purposes.
      Use hashlib.sha256() or hashlib.sha3_256() instead.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: HIGH
      impact: MEDIUM
      category: security
      technology:
        - python
    pattern-sources:
      - patterns:
          - pattern: |
              def $FUNC(..., $PARAM, ...):
                  ...
          - focus-metavariable: $PARAM
    pattern-sinks:
      - patterns:
          - pattern: hashlib.md5($DATA)
          - focus-metavariable: $DATA
      - patterns:
          - pattern: hashlib.sha1($DATA)
          - focus-metavariable: $DATA
    # No sanitizers — weak hash usage is always flagged regardless of context

  # Regex: MD5 usage anywhere
  - id: python-weak-hash-md5
    pattern: hashlib.md5(...)
    message: >
      MD5 is cryptographically broken. Use hashlib.sha256() or stronger.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: HIGH
      impact: MEDIUM
      category: security
      technology:
        - python

  # Regex: SHA1 usage anywhere
  - id: python-weak-hash-sha1
    pattern: hashlib.sha1(...)
    message: >
      SHA1 is cryptographically weak. Use hashlib.sha256() or stronger.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: HIGH
      impact: MEDIUM
      category: security
      technology:
        - python

  # Regex: DES cipher (weak)
  - id: python-weak-cipher-des
    pattern: DES.new(...)
    message: >
      DES is a weak cipher with only 56-bit keys. Use AES instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python

  # Regex: insecure random for security
  - id: python-insecure-random
    pattern-either:
      - pattern: random.randint(...)
      - pattern: random.random()
      - pattern: random.choice(...)
      - pattern: random.uniform(...)
    message: >
      The random module is not cryptographically secure.
      Use secrets.token_hex() or secrets.randbelow() for security-sensitive operations.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-330: Use of Insufficiently Random Values"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # Regex: insecure temp file
  - id: python-insecure-tempfile
    pattern: tempfile.mktemp(...)
    message: >
      tempfile.mktemp() is insecure due to race conditions.
      Use tempfile.mkstemp() or tempfile.NamedTemporaryFile() instead.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-377: Insecure Temporary File"
      confidence: HIGH
      impact: MEDIUM
      category: security
      technology:
        - python
