rules:
  # ============================================================
  # Python XSS Detection Rules
  # Custom rules for detecting cross-site scripting patterns
  # in Python web applications.
  # ============================================================

  # 1. String concatenation with HTML tags
  - id: python-xss-string-concat
    patterns:
      - pattern: |
          "..." + $VAR + "..."
      - metavariable-pattern:
          metavariable: $VAR
          pattern: $INPUT
      - pattern-not: |
          "..." + str(int($VAR)) + "..."
    message: >
      User input is concatenated directly into an HTML string without escaping.
      This can lead to Cross-Site Scripting (XSS).
      Use a templating engine with auto-escaping or escape the input.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # 2. Format string with HTML content
  - id: python-xss-format-string
    patterns:
      - pattern: $TEMPLATE % $INPUT
      - metavariable-regex:
          metavariable: $TEMPLATE
          regex: .*<[a-zA-Z].*
    message: >
      User input is inserted into an HTML string via % formatting without escaping.
      This can lead to Cross-Site Scripting (XSS).
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # 3. F-string with HTML/script content
  - id: python-xss-fstring
    pattern: |
      f"...{$VAR}..."
    metavariable-regex:
      metavariable: $__TEXT__
      regex: .*<(script|div|span|p|h[1-6]|a|img|iframe|body|html|form|input|button|style|link|meta|table|tr|td|th|ul|ol|li|br|hr)[\s>].*
    message: >
      User input is inserted into an HTML/script string via f-string without escaping.
      This can lead to Cross-Site Scripting (XSS).
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # 4. markupsafe.Markup wrapping untrusted input
  - id: python-xss-markup-unsafe
    patterns:
      - pattern: Markup($INPUT)
      - pattern-not: Markup("")
    message: >
      markupsafe.Markup() marks a string as safe HTML, bypassing auto-escaping.
      If the input contains user-controlled data, this leads to XSS.
      Use Markup.escape() instead, or pass escaped content.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # 5. Markup() with % formatting
  - id: python-xss-markup-format
    pattern: Markup("...") % $INPUT
    message: >
      markupsafe.Markup() with % formatting can lead to XSS if the input
      is not properly escaped. The % operator on Markup does escape arguments,
      but this pattern should be reviewed carefully.
    languages: [python]
    severity: INFO
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: LOW
      impact: MEDIUM
      category: security
      technology:
        - python

  # 6. response.write with HTML
  - id: python-xss-response-write
    patterns:
      - pattern: $RESPONSE.write("..." + $VAR + "...")
    message: >
      User input is written directly to an HTTP response with HTML content.
      This can lead to Cross-Site Scripting (XSS).
      Use a templating engine with auto-escaping.
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python

  # 7. .format() with HTML content
  - id: python-xss-dot-format
    patterns:
      - pattern: $TEMPLATE.format(...)
      - metavariable-regex:
          metavariable: $TEMPLATE
          regex: .*<[a-zA-Z].*
    message: >
      User input is inserted into an HTML string via .format() without escaping.
      This can lead to Cross-Site Scripting (XSS).
    languages: [python]
    severity: WARNING
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: MEDIUM
      impact: MEDIUM
      category: security
      technology:
        - python

  # 8. render_template_string (Jinja2 SSTI / XSS)
  - id: python-xss-render-template-string
    pattern: render_template_string($INPUT, ...)
    message: >
      render_template_string() with user-controlled input can lead to
      Server-Side Template Injection (SSTI) and XSS. Use render_template()
      with a file-based template instead.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-79: Improper Neutralization of Input During Web Page Generation"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python
        - flask
