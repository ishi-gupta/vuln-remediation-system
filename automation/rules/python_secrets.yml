rules:
  # ============================================================
  # Hardcoded Secrets Detection (CWE-798)
  # Pattern-based detection of credentials in source code
  # Note: Gitleaks handles most of this, these are supplementary
  # ============================================================

  # Hardcoded password assignments
  - id: python-hardcoded-password
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $DICT["password"] = "..."
          - pattern: $DICT["secret"] = "..."
          - pattern: $DICT["api_key"] = "..."
          - pattern: $DICT["token"] = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: .*(password|passwd|secret|api_key|apikey|token|auth_token|access_key|secret_key).*
    message: >
      Hardcoded credential detected. Store secrets in environment variables
      or a secrets manager, not in source code.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: MEDIUM
      impact: HIGH
      category: security
      technology:
        - python

  # Hardcoded connection strings with passwords
  - id: python-hardcoded-connection-string
    pattern-regex: '(postgresql|mysql|mongodb|redis|amqp)://[^:]+:[^@]+@'
    message: >
      Database connection string with embedded credentials detected.
      Use environment variables for database credentials.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python

  # AWS access key pattern
  - id: python-hardcoded-aws-key
    pattern-regex: 'AKIA[0-9A-Z]{16}'
    message: >
      AWS access key ID detected in source code.
      Use IAM roles, environment variables, or AWS Secrets Manager.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python
        - aws

  # GitHub token pattern
  - id: python-hardcoded-github-token
    pattern-regex: 'gh[ps]_[A-Za-z0-9_]{36,}'
    message: >
      GitHub personal access token detected in source code.
    languages: [python]
    severity: ERROR
    metadata:
      cwe:
        - "CWE-798: Use of Hard-coded Credentials"
      confidence: HIGH
      impact: HIGH
      category: security
      technology:
        - python
        - github
