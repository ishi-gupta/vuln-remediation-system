name: Remediation Trigger

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository to remediate (owner/repo format)"
        required: false
        default: "ishi-gupta/superset"
        type: string
      issue_number:
        description: "Issue number in the target repo to remediate"
        required: false
        type: string
      issue_url:
        description: "Full URL of the issue to remediate"
        required: false
        type: string

permissions:
  contents: read

jobs:
  remediate:
    name: Trigger Remediation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout vuln-remediation-system
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e .

      - name: Run orchestrator (one-shot)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ github.event.inputs.target_repo || 'ishi-gupta/superset' }}
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
        run: |
          python -m automation.orchestrator \
            --repo "$GITHUB_REPO" \
            --one-shot
