name: Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Target repository to scan (owner/repo format)"
        required: false
        default: ""
        type: string
  repository_dispatch:
    types: [trigger-vuln-scan]

permissions:
  contents: read

jobs:
  scan:
    name: Scan Target Repository
    runs-on: ubuntu-latest

    env:
      # Priority: repository_dispatch payload > workflow_dispatch input > default
      TARGET_REPO: >-
        ${{
          github.event.client_payload.target_repo
          || github.event.inputs.target_repo
          || 'ishi-gupta/superset'
        }}

    steps:
      - name: Validate target repo format
        run: |
          if [[ "$TARGET_REPO" == *$'\n'* ]] || ! echo "$TARGET_REPO" | grep -qE '^[a-zA-Z0-9._-]+/[a-zA-Z0-9._-]+$'; then
            echo "::error::Invalid target_repo format: '$TARGET_REPO'. Expected 'owner/repo'."
            exit 1
          fi
          echo "Scanning repository: $TARGET_REPO"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TARGET_REPO }}
          path: target-repo
          token: ${{ secrets.GH_PAT }}

      - name: Checkout vuln-remediation-system
        uses: actions/checkout@v4
        with:
          path: vuln-remediation-system

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install -e "./vuln-remediation-system[scanners]"

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run vulnerability scanner
        run: |
          python -m automation.scanner \
            --target ./target-repo \
            --output scan_results.json \
            --scanners bandit semgrep pip-audit gitleaks

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: scan_results.json
          retention-days: 30

      - name: Create GitHub Issues from findings
        id: create-issues
        if: github.event_name != 'pull_request' && github.event.client_payload.trigger_event != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ${{ env.TARGET_REPO }}
        run: |
          python -m automation.issue_creator \
            --input scan_results.json \
            --repo "$TARGET_REPO"

      - name: Trigger remediation orchestrator
        if: steps.create-issues.outcome == 'success' && github.event_name != 'pull_request' && github.event.client_payload.trigger_event != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/ishi-gupta/vuln-remediation-system/actions/workflows/remediate.yml/dispatches" \
            -d '{"ref":"main"}'
          echo "Remediation orchestrator triggered"
