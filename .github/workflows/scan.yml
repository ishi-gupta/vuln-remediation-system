name: Vulnerability Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *" # Daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Scan Target Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout target repo (superset)
        uses: actions/checkout@v4
        with:
          repository: ishi-gupta/superset
          path: superset
          token: ${{ secrets.GH_PAT }}

      - name: Checkout vuln-remediation-system
        uses: actions/checkout@v4
        with:
          path: vuln-remediation-system

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install scanner dependencies
        run: pip install -e "./vuln-remediation-system[scanners]"

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION="8.18.4"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          chmod +x /usr/local/bin/gitleaks
          gitleaks version

      - name: Run vulnerability scanner
        run: |
          python -m automation.scanner \
            --target ./superset \
            --output scan_results.json \
            --scanners bandit semgrep pip-audit gitleaks

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-results
          path: scan_results.json
          retention-days: 30

      - name: Create GitHub Issues from findings
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPO: ishi-gupta/superset
        run: |
          python -m automation.issue_creator \
            --input scan_results.json \
            --repo ishi-gupta/superset
